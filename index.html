<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Mortality Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script defer src="/static/app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 24px;
        }
        .nav {
            margin-bottom: 20px;
        }
        .nav button {
            margin-right: 8px;
        }
        .filters {
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        .section {
            margin-top: 20px;
        }
        .hidden {
            display: none;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 12px;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: left;
            font-size: 14px;
        }
        .card-row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin: 16px 0;
        }
        .card {
            border: 1px solid #ccc;
            padding: 12px;
            min-width: 160px;
        }
        .top-tables {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }
        .top-tables > div {
            flex: 1;
            min-width: 320px;
        }
        .pagination {
            margin-top: 12px;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        canvas {
            max-width: 100%;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>Mortality Dashboard</h1>

    <div class="nav">
        <button onclick="showPage('summaryPage')">Summary Page</button>
        <button onclick="showPage('analysisPage')">Analysis Page</button>
    </div>

    <div class="filters">
        <label>
            Year:
            <select id="year"></select>
        </label>

        <label>
            State:
            <select id="state"></select>
        </label>

        <label>
            City:
            <input id="city" placeholder="Enter city">
        </label>

        <label>
            Facility:
            <input id="facility" type="text" placeholder="Search facility">
        </label>

        <button onclick="applyAll()">Apply Filters</button>
        <button onclick="resetFilters()">Reset</button>
    </div>

    <div id="summaryPage">
        <div class="section">
            <h2>Summary</h2>
            <div id="summaryCards" class="card-row"></div>
        </div>

        <div class="section">
            <h2>Top Facilities</h2>
            <div class="top-tables">
                <div>
                    <h3>Top 10 Highest</h3>
                    <div id="topHighest"></div>
                </div>
                <div>
                    <h3>Top 10 Lowest</h3>
                    <div id="topLowest"></div>
                </div>
            </div>
        </div>

        <div class="section">
            <h2>Full Data Table</h2>
            <div id="tableContainer"></div>
            <div class="pagination">
                <button onclick="prevPage()">Previous</button>
                <span id="pageInfo">Page 1</span>
                <button onclick="nextPage()">Next</button>
            </div>
        </div>
    </div>

    <div id="analysisPage" class="hidden">
        <div class="section">
            <h2>Yearly Mortality Trend</h2>
            <canvas id="yearlyChart"></canvas>
        </div>

        <div class="section">
            <h2>Mortality Distribution</h2>
            <canvas id="distributionChart"></canvas>
        </div>
    </div>

</body>
</html>
